<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Гид по ассетам — СтудентФуд</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #1a1a1a;
      color: #eaeaea;
      margin: 0;
      padding: 40px 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #FFD500;
      margin-bottom: 40px;
    }
    h2 {
      border-bottom: 2px solid #333;
      padding-bottom: 10px;
      margin-top: 50px;
      color: #fff;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      background-color: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .img-wrapper {
      width: 100%;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #111;
      border-radius: 8px;
      margin-bottom: 15px;
      overflow: hidden;
    }
    .img-wrapper img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }
    .info {
      text-align: center;
      font-size: 13px;
      color: #bbb;
      width: 100%;
    }
    .filename {
      font-weight: 600;
      color: #FFD500;
      margin-bottom: 5px;
      word-break: break-all;
    }
    .size {
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Гид по ассетам — СтудентФуд</h1>
    
    <div id="sections"></div>
  </div>

  <script>
    const assets = {
      "Часть 1: Полный дизайн / Макет": [
        { name: "part1_img1.png", size: "1274 KB" }
      ],
      "Часть 2: Комбо-наборы (4 шт)": [
        { name: "part2_img1.png", size: "1490 KB" },
        { name: "part2_img2.png", size: "1690 KB" },
        { name: "part2_img3.png", size: "1676 KB" },
        { name: "part2_img4.png", size: "1671 KB" }
      ],
      "Часть 3: Популярные блюда (6 шт)": [
        { name: "part3_img1.png", size: "1755 KB" },
        { name: "part3_img2.png", size: "1592 KB" },
        { name: "part3_img3.png", size: "1392 KB" },
        { name: "part3_img4.png", size: "1468 KB" },
        { name: "part3_img5.png", size: "1296 KB" },
        { name: "part3_img6.png", size: "1400 KB" }
      ],
      "Часть 4: Элементы первого экрана (бургер, картошка, шаурма, напиток, стикеры)": [
        { name: "part4_img1.png", size: "389 KB" },
        { name: "part4_img2.png", size: "464 KB" },
        { name: "part4_img3.png", size: "394 KB" },
        { name: "part4_img4.png", size: "422 KB" },
        { name: "part4_img5.png", size: "536 KB" },
        { name: "part4_img6.png", size: "651 KB" }
      ],
      "Часть 5: Отдельные графические элементы": [
        { name: "part5_img1.png", size: "535 KB" }
      ],
      "Часть 6: Аватары студентов для отзывов (4 шт)": [
        { name: "part6_img1.png", size: "882 KB" },
        { name: "part6_img2.png", size: "224 KB" },
        { name: "part6_img3.png", size: "1614 KB" },
        { name: "part6_img4.png", size: "308 KB" }
      ],
      "Часть 7: Как это работает — Иконки (4 шт)": [
        { name: "part7_img1.png", size: "1579 KB" },
        { name: "part7_img2.png", size: "1366 KB" },
        { name: "part7_img3.png", size: "1478 KB" },
        { name: "part7_img4.png", size: "1377 KB" }
      ],
      "Часть 8: Почему студенты выбирают нас — Иконки (5 шт)": [
        { name: "part8_img1.png", size: "380 KB" },
        { name: "part8_img2.png", size: "640 KB" },
        { name: "part8_img3.png", size: "1250 KB" },
        { name: "part8_img4.png", size: "1307 KB" },
        { name: "part8_img5.png", size: "387 KB" }
      ],
      "Часть 9: Мобильные телефоны, QR-код, кнопки сторов и дополнительные ассеты": [
        { name: "part9_img1.png", size: "213 KB" },
        { name: "part9_img2.png", size: "812 KB" },
        { name: "part9_img3.png", size: "800 KB" },
        { name: "part9_img4.png", size: "224 KB" },
        { name: "part9_img5.png", size: "929 KB" },
        { name: "part9_img6.png", size: "878 KB" },
        { name: "part9_img7.png", size: "187 KB" },
        { name: "part9_img8.png", size: "230 KB" }
      ]
    };

    const container = document.getElementById('sections');
    for (const [title, files] of Object.entries(assets)) {
      const section = document.createElement('div');
      
      const h2 = document.createElement('h2');
      h2.textContent = title;
      section.appendChild(h2);
      
      const grid = document.createElement('div');
      grid.className = 'grid';
      
      files.forEach(f => {
        const card = document.createElement('div');
        card.className = 'card';
        
        const wrapper = document.createElement('div');
        wrapper.className = 'img-wrapper';
        
        const img = document.createElement('img');
        img.src = `./img/${f.name}`;
        img.alt = f.name;
        wrapper.appendChild(img);
        card.appendChild(wrapper);
        
        const info = document.createElement('div');
        info.className = 'info';
        
        const filename = document.createElement('div');
        filename.className = 'filename';
        filename.textContent = f.name;
        info.appendChild(filename);
        
        const size = document.createElement('div');
        size.className = 'size';
        size.textContent = f.size;
        info.appendChild(size);
        
        card.appendChild(info);
        grid.appendChild(card);
      });
      
      section.appendChild(grid);
      container.appendChild(section);
    }
  </script>
</body>
</html>
